<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เกมสุ่มอวัยวะภายใน ป.2</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
:root{--primary:#5e35b1;--dark:#263238}
body{margin:0;min-height:100vh;font-family:'Kanit',sans-serif;background:radial-gradient(circle at top left,rgba(255,255,255,.55),transparent 30%),radial-gradient(circle at bottom right,rgba(255,255,255,.45),transparent 35%),linear-gradient(135deg,#a1c4fd,#c2e9fb,#fbc2eb);display:flex;align-items:center;justify-content:center;color:var(--dark);overflow-x:hidden}
.game{width:96%;max-width:1180px;min-height:94vh;background:rgba(255,255,255,.93);border-radius:36px;padding:22px;text-align:center;box-shadow:0 25px 70px rgba(0,0,0,.25);border:3px solid rgba(255,255,255,.65);position:relative;overflow:hidden}
.game::before{content:"";position:absolute;width:240px;height:240px;background:rgba(126,87,194,.12);border-radius:50%;top:-80px;left:-70px}
.game::after{content:"";position:absolute;width:280px;height:280px;background:rgba(255,152,0,.12);border-radius:50%;right:-100px;bottom:-100px}
.game-content{position:relative;z-index:2}
h1{margin:4px 0;font-size:clamp(28px,5vw,56px);color:var(--primary);text-shadow:0 4px 0 rgba(255,255,255,.75)}
.subtitle{font-size:clamp(16px,2.4vw,24px);color:#455a64;margin-bottom:12px}
.card{min-height:52vh;background:radial-gradient(circle at 50% 10%,rgba(255,255,255,.9),transparent 30%),linear-gradient(180deg,#fff,#fff8e1);border-radius:34px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:14px;padding:20px;box-shadow:inset 0 0 25px rgba(255,255,255,.9),0 15px 35px rgba(0,0,0,.16);border:4px solid rgba(255,255,255,.9)}
.image-wrap{width:min(48vh,360px);height:min(48vh,360px);max-width:82vw;max-height:82vw;display:flex;align-items:center;justify-content:center;animation:pop .45s ease;filter:drop-shadow(0 16px 18px rgba(0,0,0,.18))}
#organImage{max-width:100%;max-height:100%;object-fit:contain}
.start-icon{font-size:clamp(130px,25vw,280px);line-height:1}
.organ-name-hidden{margin-top:8px;font-size:clamp(18px,3vw,30px);color:#607d8b;font-weight:700}
#questionTitle{margin-top:12px;font-size:clamp(28px,5vw,58px);font-weight:900;color:#e65100;text-shadow:0 4px 0 #ffe082}
.answer-box{display:none;margin-top:16px;background:linear-gradient(135deg,#e3f2fd,#f3e5f5);border:4px dashed #42a5f5;border-radius:26px;padding:18px;width:100%;max-width:930px;font-size:clamp(20px,3.5vw,36px);font-weight:700;color:#0d47a1;animation:fadeInUp .35s ease}
.answer-label{color:#d84315;margin-right:6px}
.buttons,.teacher-buttons,.sound-buttons{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:14px}
button{border:none;border-radius:22px;padding:18px;font-family:'Kanit',sans-serif;font-size:clamp(18px,3vw,28px);font-weight:800;color:#fff;cursor:pointer;box-shadow:0 9px 0 rgba(0,0,0,.25),0 16px 24px rgba(0,0,0,.2);transition:transform .15s ease,box-shadow .15s ease,filter .15s ease}
button:hover{filter:brightness(1.05)}
button:active{transform:translateY(7px);box-shadow:0 2px 0 rgba(0,0,0,.25)}
.btn-random{background:linear-gradient(135deg,#00c853,#64dd17)}
.btn-thai{background:linear-gradient(135deg,#ff7043,#ff9800)}
.btn-english{background:linear-gradient(135deg,#2196f3,#00bcd4)}
.btn-show{background:linear-gradient(135deg,#7e57c2,#5e35b1)}
.btn-correct{background:linear-gradient(135deg,#43a047,#00c853)}
.btn-wrong{background:linear-gradient(135deg,#e53935,#8e24aa)}
.footer{margin-top:14px;color:#546e7a;font-size:16px}
.confetti{position:fixed;width:12px;height:12px;top:-20px;animation:fall 1.8s linear forwards;border-radius:4px;z-index:9999}
.toast{position:fixed;left:50%;top:24px;transform:translateX(-50%);background:rgba(38,50,56,.92);color:#fff;padding:14px 24px;border-radius:999px;font-size:18px;font-weight:700;box-shadow:0 12px 30px rgba(0,0,0,.25);z-index:10000;animation:toastIn .25s ease}
@keyframes pop{0%{transform:scale(.25);opacity:0}70%{transform:scale(1.12);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes fadeInUp{from{transform:translateY(15px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes toastIn{from{transform:translate(-50%,-20px);opacity:0}to{transform:translate(-50%,0);opacity:1}}
@media(max-width:700px){.buttons,.teacher-buttons,.sound-buttons{grid-template-columns:1fr}.game{border-radius:24px;padding:14px;min-height:96vh}.card{min-height:45vh;border-radius:24px}.image-wrap{width:min(36vh,280px);height:min(36vh,280px)}}
</style>
</head>
<body>
<div class="game">
<div class="game-content">
<h1>🧠 เกมสุ่มอวัยวะภายใน</h1>
<div class="subtitle">วิชาสุขศึกษา ชั้นประถมศึกษาปีที่ 2</div>
<div class="card">
<div class="image-wrap" id="imageWrap"><div class="start-icon" id="startIcon">🎲</div><img id="organImage" src="" alt="" style="display:none;"></div>
<div class="organ-name-hidden" id="organNameHint">กดสุ่มเพื่อเริ่มเกม</div>
<div id="questionTitle">กดสุ่มรูปภาพอวัยวะ</div>
<div class="answer-box" id="answerBox"><span class="answer-label" id="answerLabel">คำตอบ:</span><span id="answerText"></span></div>
</div>
<div class="buttons"><button class="btn-random" onclick="randomOrgan()">🎯 สุ่มอวัยวะ</button><button class="btn-show" onclick="showAnswer()">📖 แสดงคำตอบ</button></div>
<div class="sound-buttons"><button class="btn-thai" onclick="speakThai()">🔊 เสียงไทย</button><button class="btn-english" onclick="speakEnglish()">🔊 English</button></div>
<div class="teacher-buttons"><button class="btn-correct" onclick="correctAnswer()">✅ ตอบถูก</button><button class="btn-wrong" onclick="wrongAnswer()">❌ ตอบผิด</button></div>
<div class="footer">สื่อการเรียนรู้สุขศึกษา ป.2 เรื่อง อวัยวะภายใน</div>
</div>
</div>
<script>
let currentOrgan=null,currentQuestionType=null,audioCtx=null;
const organs=[
{image:"images/brain.png",thai:"สมอง",english:"brain",function:"ควบคุมความคิด ความจำ และการสั่งงานของร่างกาย",care:"พักผ่อนให้เพียงพอ กินอาหารมีประโยชน์ และระวังศีรษะกระแทก"},
{image:"images/heart.png",thai:"หัวใจ",english:"heart",function:"สูบฉีดเลือดไปเลี้ยงส่วนต่าง ๆ ของร่างกาย",care:"ออกกำลังกาย กินอาหารที่มีประโยชน์ และไม่กินอาหารมันมากเกินไป"},
{image:"images/lungs.png",thai:"ปอด",english:"lungs",function:"ช่วยในการหายใจ รับออกซิเจนเข้าสู่ร่างกาย",care:"หลีกเลี่ยงควันบุหรี่ ฝุ่น และออกกำลังกายสม่ำเสมอ"},
{image:"images/liver.png",thai:"ตับ",english:"liver",function:"ช่วยกรองของเสียและช่วยย่อยอาหารบางชนิด",care:"กินอาหารสะอาด ไม่กินของหมักดองมากเกินไป และล้างมือก่อนกินอาหาร"},
{image:"images/kidneys.png",thai:"ไต",english:"kidneys",function:"กรองของเสียออกจากเลือด และขับออกเป็นปัสสาวะ",care:"ดื่มน้ำสะอาดให้เพียงพอ และไม่กินเค็มมากเกินไป"},
{image:"images/stomach.png",thai:"กระเพาะอาหาร",english:"stomach",function:"ย่อยอาหารให้ละเอียดมากขึ้น",care:"กินอาหารตรงเวลา เคี้ยวอาหารให้ละเอียด และไม่กินเผ็ดจัด"},
{image:"images/small_intestine.png",thai:"ลำไส้เล็ก",english:"small intestine",function:"ย่อยอาหารต่อและดูดซึมสารอาหารเข้าสู่ร่างกาย",care:"กินอาหารสะอาด กินผักผลไม้ และล้างมือก่อนกินอาหาร"},
{image:"images/large_intestine.png",thai:"ลำไส้ใหญ่",english:"large intestine",function:"ดูดซึมน้ำและขับกากอาหารออกจากร่างกาย",care:"ดื่มน้ำให้เพียงพอ กินผักผลไม้ และขับถ่ายให้เป็นเวลา"}
];
function randomOrgan(){
const index=Math.floor(Math.random()*organs.length);currentOrgan=organs[index];currentQuestionType=Math.random()<.5?"function":"care";
document.getElementById("startIcon").style.display="none";
const img=document.getElementById("organImage");img.src=currentOrgan.image;img.alt=currentOrgan.thai;img.style.display="block";
document.getElementById("organNameHint").textContent="รูปภาพอวัยวะภายใน";
if(currentQuestionType==="function"){document.getElementById("questionTitle").textContent="อวัยวะนี้ทำหน้าที่อะไร?";document.getElementById("answerLabel").textContent="หน้าที่:";document.getElementById("answerText").textContent=currentOrgan.function}else{document.getElementById("questionTitle").textContent="อวัยวะนี้ดูแลอย่างไร?";document.getElementById("answerLabel").textContent="การดูแล:";document.getElementById("answerText").textContent=currentOrgan.care}
document.getElementById("answerBox").style.display="none";
const wrap=document.getElementById("imageWrap");wrap.style.animation="none";void wrap.offsetWidth;wrap.style.animation="pop .45s ease"
}
function showAnswer(){if(!currentOrgan){showToast("กรุณากดสุ่มอวัยวะก่อน");return}document.getElementById("answerBox").style.display="block"}
function speakThai(){if(!currentOrgan){showToast("กรุณากดสุ่มอวัยวะก่อน");return}speakText(currentOrgan.thai,"th-TH",.85,1)}
function speakEnglish(){if(!currentOrgan){showToast("กรุณากดสุ่มอวัยวะก่อน");return}speakText(currentOrgan.english,"en-US",.75,1)}
function speakText(text,lang,rate,pitch){if(!("speechSynthesis"in window)){showToast("เบราว์เซอร์นี้ไม่รองรับเสียงอ่าน");return}window.speechSynthesis.cancel();const utterance=new SpeechSynthesisUtterance(text);utterance.lang=lang;utterance.rate=rate;utterance.pitch=pitch;utterance.volume=1;const voices=window.speechSynthesis.getVoices();const matchedVoice=voices.find(v=>v.lang===lang||v.lang.toLowerCase().startsWith(lang.split("-")[0].toLowerCase()));if(matchedVoice){utterance.voice=matchedVoice}window.speechSynthesis.speak(utterance)}
function getAudioContext(){if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)()}if(audioCtx.state==="suspended"){audioCtx.resume()}return audioCtx}
function correctAnswer(){playClapSound();createConfetti()}
function wrongAnswer(){playWrongHorn()}
function playClapSound(){const ctx=getAudioContext();for(let i=0;i<8;i++){setTimeout(function(){const bufferSize=ctx.sampleRate*.08;const buffer=ctx.createBuffer(1,bufferSize,ctx.sampleRate);const data=buffer.getChannelData(0);for(let j=0;j<bufferSize;j++){data[j]=(Math.random()*2-1)*Math.pow(1-j/bufferSize,2)}const noise=ctx.createBufferSource();noise.buffer=buffer;const filter=ctx.createBiquadFilter();filter.type="bandpass";filter.frequency.value=1200+Math.random()*800;filter.Q.value=.7;const gain=ctx.createGain();gain.gain.value=.65;noise.connect(filter);filter.connect(gain);gain.connect(ctx.destination);noise.start()},i*90)}}
function playWrongHorn(){const ctx=getAudioContext();const notes=[{freq:220,time:0},{freq:160,time:.28}];notes.forEach(function(note){const osc=ctx.createOscillator();const gain=ctx.createGain();osc.type="sawtooth";osc.frequency.setValueAtTime(note.freq,ctx.currentTime+note.time);gain.gain.setValueAtTime(.001,ctx.currentTime+note.time);gain.gain.exponentialRampToValueAtTime(.55,ctx.currentTime+note.time+.04);gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+note.time+.35);osc.connect(gain);gain.connect(ctx.destination);osc.start(ctx.currentTime+note.time);osc.stop(ctx.currentTime+note.time+.38)})}
function createConfetti(){const colors=["#ffeb3b","#00e5ff","#ff4081","#76ff03","#ff9100","#7c4dff"];for(let i=0;i<80;i++){const confetti=document.createElement("div");confetti.className="confetti";confetti.style.left=Math.random()*100+"vw";confetti.style.background=colors[Math.floor(Math.random()*colors.length)];confetti.style.animationDuration=(Math.random()*1.2+1.2)+"s";confetti.style.transform="rotate("+(Math.random()*360)+"deg)";document.body.appendChild(confetti);setTimeout(function(){confetti.remove()},2600)}}
function showToast(message){const oldToast=document.querySelector(".toast");if(oldToast){oldToast.remove()}const toast=document.createElement("div");toast.className="toast";toast.textContent=message;document.body.appendChild(toast);setTimeout(function(){toast.remove()},1800)}
if("speechSynthesis"in window){window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices()}}
</script>
</body>
</html>
